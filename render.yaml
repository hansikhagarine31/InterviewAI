# Render Blueprint — https://render.com/docs/blueprint-spec
# Lets you spin up the backend with "New +" -> "Blueprint" in the Render
# dashboard instead of configuring it by hand.
services:
  - type: web
    name: interview-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
